server {
  listen       ${PORT} default_server;
  listen       [::]:${PORT} default_server;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Make sure WebVTT subtitles are served with the right MIME type
  types {
    text/html                             html htm;
    text/css                              css;
    application/javascript                js;
    application/json                      json;
    image/png                             png;
    image/jpeg                            jpg jpeg;
    image/svg+xml                         svg;
    image/webp                            webp;
    image/x-icon                          ico;
    video/mp4                             mp4;
    audio/wav                             wav;
    text/vtt                              vtt;
    application/font-woff                 woff;
    application/font-woff2                woff2;
    text/plain                            txt;
  }
  default_type application/octet-stream;

  # Gzip text assets (videos and images are already compressed)
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/vtt application/javascript application/json image/svg+xml;

  # Cache static assets aggressively, but keep HTML fresh
  location ~* \.(?:css|js|png|jpg|jpeg|svg|webp|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
  location ~* \.(?:mp4|wav|vtt)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    add_header Accept-Ranges bytes;
    try_files $uri =404;
  }
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Healthcheck endpoint for Railway / uptime monitors
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}
